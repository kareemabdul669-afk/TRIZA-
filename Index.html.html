<style>
  #triza-app {
    --ink: #2B2521;
    --charcoal: #1E1A17;
    --cream: #FBF5EA;
    --paper: #FFFFFF;
    --chili: #C1432B;
    --chili-dark: #9E3320;
    --turmeric: #E2A63B;
    --sage: #4F7358;
    --muted: #8A7F73;
    --border: #EAE0D2;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
    --display: 'Archivo Black', 'Arial Black', sans-serif;
    --body: 'Inter', 'Segoe UI', sans-serif;

    background: var(--cream);
    color: var(--ink);
    font-family: var(--body);
    min-height: 100vh;
    padding: 0;
    box-sizing: border-box;
  }
  #triza-app *, #triza-app *::before, #triza-app *::after { box-sizing: border-box; }
  #triza-app button { font-family: var(--body); cursor: pointer; }
  #triza-app input, #triza-app select, #triza-app textarea { font-family: var(--body); }

  .triza-header {
    background: var(--charcoal);
    color: var(--cream);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .triza-wordmark {
    font-family: var(--display);
    font-size: 26px;
    letter-spacing: 1px;
    color: var(--turmeric);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .triza-wordmark span {
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .triza-tabs {
    display: flex;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    padding: 4px;
    border-radius: 999px;
  }
  .triza-tab {
    border: none;
    background: transparent;
    color: var(--cream);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    opacity: 0.65;
    transition: all 0.15s ease;
  }
  .triza-tab.active {
    background: var(--chili);
    opacity: 1;
  }
  .triza-tab:hover { opacity: 1; }

  .triza-body { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .triza-panel { display: none; }
  .triza-panel.active { display: block; }

  .triza-grid-2 {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 860px) {
    .triza-grid-2 { grid-template-columns: 1fr; }
  }

  .triza-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
  }
  .triza-card h3 {
    margin: 0 0 14px 0;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 700;
  }

  .triza-cat-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--chili);
    margin: 18px 0 8px 0;
  }
  .triza-cat-label:first-child { margin-top: 0; }

  .triza-item-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .triza-item-btn {
    border: 1px solid var(--border);
    background: var(--cream);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color 0.15s ease, transform 0.05s ease;
  }
  .triza-item-btn:hover { border-color: var(--chili); }
  .triza-item-btn:active { transform: scale(0.98); }
  .triza-item-name { font-size: 13px; font-weight: 600; line-height: 1.25; }
  .triza-item-price { font-family: var(--mono); font-size: 13px; color: var(--chili-dark); font-weight: 600; }
  .triza-veg-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px;
  }
  .veg { background: var(--sage); }
  .nonveg { background: var(--chili); }

  /* Receipt-style cart */
  .triza-receipt {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 18px;
    position: relative;
    font-family: var(--mono);
  }
  .triza-receipt::before, .triza-receipt::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 10px;
    background-image: radial-gradient(circle at 8px 5px, var(--cream) 5px, transparent 5.5px);
    background-size: 16px 10px;
    background-repeat: repeat-x;
  }
  .triza-receipt::before { top: -5px; }
  .triza-receipt::after { bottom: -5px; transform: rotate(180deg); }
  .triza-receipt-head { text-align: center; font-family: var(--display); font-size: 18px; letter-spacing: 1px; margin-bottom: 2px; }
  .triza-receipt-sub { text-align: center; font-size: 10px; color: var(--muted); margin-bottom: 14px; letter-spacing: 1px; }
  .triza-receipt-line {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12.5px; padding: 5px 0; border-bottom: 1px dashed var(--border);
    gap: 8px;
  }
  .triza-receipt-line .name { flex: 1; }
  .triza-receipt-line .qty-ctrl { display: flex; align-items: center; gap: 6px; }
  .triza-receipt-line .qty-ctrl button {
    width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--cream); font-size: 12px; line-height: 1; padding: 0;
  }
  .triza-receipt-empty { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0; }
  .triza-receipt-totals { margin-top: 10px; }
  .triza-receipt-totals .row { display: flex; justify-content: space-between; font-size: 12.5px; padding: 3px 0; }
  .triza-receipt-totals .grand { font-size: 16px; font-weight: 700; border-top: 1px solid var(--ink); margin-top: 6px; padding-top: 8px; }

  .triza-field { margin-bottom: 10px; }
  .triza-field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
  .triza-field input, .triza-field select, .triza-field textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--cream); color: var(--ink);
  }
  .triza-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .triza-pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .triza-pill {
    border: 1px solid var(--border); background: var(--cream); border-radius: 999px; padding: 7px 14px; font-size: 12.5px; font-weight: 600;
  }
  .triza-pill.selected { background: var(--charcoal); color: var(--cream); border-color: var(--charcoal); }

  .triza-btn-primary {
    width: 100%; background: var(--chili); color: white; border: none; padding: 13px; border-radius: 10px;
    font-weight: 700; font-size: 14px; letter-spacing: 0.3px; margin-top: 12px;
  }
  .triza-btn-primary:hover { background: var(--chili-dark); }
  .triza-btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
  .triza-btn-secondary {
    background: transparent; border: 1px solid var(--border); color: var(--ink); padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
  }

  .triza-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .triza-summary-card { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .triza-summary-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .triza-summary-card .value { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--charcoal); }

  .triza-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .triza-table th { text-align: left; text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.5px; color: var(--muted); padding: 8px 10px; border-bottom: 2px solid var(--border); }
  .triza-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
  .triza-table tr:hover td { background: var(--cream); }

  .triza-badge { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.4px; }
  .badge-pending { background: #FBEAD9; color: var(--chili-dark); }
  .badge-fulfilled { background: #E4EFE5; color: var(--sage); }
  .badge-cancelled { background: #EFEFEF; color: var(--muted); }

  .triza-empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

  .triza-modal-backdrop {
    position: fixed; inset: 0; background: rgba(30,26,23,0.55); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  .triza-modal { background: var(--paper); border-radius: 14px; max-width: 340px; width: 100%; max-height: 85vh; overflow-y: auto; }

  .triza-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--charcoal); color: var(--cream); padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; z-index: 60;
  }
</style>

<div id="triza-app">
  <div class="triza-header">
    <div class="triza-wordmark">TRIZA <span>Cloud Kitchen · Billing</span></div>
    <div class="triza-tabs">
      <button class="triza-tab active" data-tab="bill">New Bill</button>
      <button class="triza-tab" data-tab="prebook">Pre-Booking</button>
      <button class="triza-tab" data-tab="reports">Reports</button>
      <button class="triza-tab" data-tab="menu">Menu</button>
    </div>
  </div>

  <div class="triza-body">

    <!-- BILL PANEL -->
    <div class="triza-panel active" id="panel-bill">
      <div class="triza-grid-2">
        <div class="triza-card">
          <h3>Select Items</h3>
          <div id="menu-picker"></div>
        </div>
        <div>
          <div class="triza-receipt" id="receipt">
            <div class="triza-receipt-head">TRIZA</div>
            <div class="triza-receipt-sub" id="receipt-time"></div>
            <div id="receipt-lines"></div>
            <div class="triza-receipt-totals" id="receipt-totals"></div>
          </div>
          <div class="triza-card" style="margin-top:14px;">
            <h3>Customer & Payment</h3>
            <div class="triza-row-2">
              <div class="triza-field"><label>Customer Name</label><input id="bill-name" placeholder="Optional"></div>
              <div class="triza-field"><label>Phone</label><input id="bill-phone" placeholder="Optional"></div>
            </div>
            <div class="triza-field">
              <label>Order Type</label>
              <div class="triza-pill-group" id="order-type-group">
                <button class="triza-pill selected" data-value="Takeaway">Takeaway</button>
                <button class="triza-pill" data-value="Delivery">Delivery</button>
              </div>
            </div>
            <div class="triza-field">
              <label>Payment Method</label>
              <div class="triza-pill-group" id="payment-method-group">
                <button class="triza-pill selected" data-value="Cash">Cash</button>
                <button class="triza-pill" data-value="UPI">UPI</button>
                <button class="triza-pill" data-value="Card">Card</button>
              </div>
            </div>
            <div class="triza-field">
              <label><input type="checkbox" id="gst-toggle" style="width:auto; margin-right:6px;">Apply 5% GST</label>
            </div>
            <button class="triza-btn-primary" id="complete-bill-btn" disabled>Complete Bill</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PREBOOK PANEL -->
    <div class="triza-panel" id="panel-prebook">
      <div class="triza-grid-2">
        <div class="triza-card">
          <h3>Select Items for Pre-Booking</h3>
          <div id="prebook-menu-picker"></div>
        </div>
        <div>
          <div class="triza-card">
            <h3>Booking Details</h3>
            <div class="triza-field"><label>Customer Name</label><input id="pb-name" placeholder="Required"></div>
            <div class="triza-field"><label>Phone</label><input id="pb-phone" placeholder="Required"></div>
            <div class="triza-row-2">
              <div class="triza-field"><label>Delivery Date</label><input type="date" id="pb-date"></div>
              <div class="triza-field"><label>Delivery Time</label><input type="time" id="pb-time"></div>
            </div>
            <div class="triza-field"><label>Advance Paid (₹)</label><input type="number" id="pb-advance" placeholder="0"></div>
            <div class="triza-field"><label>Notes</label><textarea id="pb-notes" rows="2" placeholder="Any special instructions"></textarea></div>
            <div class="triza-receipt-totals" id="pb-totals" style="font-family:var(--mono);"></div>
            <button class="triza-btn-primary" id="save-prebook-btn" disabled>Save Pre-Booking</button>
          </div>
        </div>
      </div>

      <div class="triza-card" style="margin-top:20px;">
        <h3>Upcoming & Past Pre-Bookings</h3>
        <div id="prebook-list"></div>
      </div>
    </div>

    <!-- REPORTS PANEL -->
    <div class="triza-panel" id="panel-reports">
      <div class="triza-pill-group" id="report-type-group" style="margin-bottom:16px;">
        <button class="triza-pill selected" data-value="sales">Sales Report</button>
        <button class="triza-pill" data-value="prebook">Pre-Booking Report</button>
      </div>

      <div id="sales-report">
        <div class="triza-pill-group" id="period-group" style="margin-bottom:16px;">
          <button class="triza-pill selected" data-value="today">Today</button>
          <button class="triza-pill" data-value="week">This Week</button>
          <button class="triza-pill" data-value="month">This Month</button>
          <button class="triza-pill" data-value="all">All Time</button>
        </div>
        <div class="triza-summary-grid" id="sales-summary"></div>
        <div class="triza-card" style="margin-bottom:16px;">
          <h3>Item-wise Sales</h3>
          <div id="item-sales-table"></div>
        </div>
        <div class="triza-card">
          <h3>Orders</h3>
          <div id="orders-table"></div>
        </div>
      </div>

      <div id="prebook-report" style="display:none;">
        <div class="triza-pill-group" id="pb-status-group" style="margin-bottom:16px;">
          <button class="triza-pill selected" data-value="All">All</button>
          <button class="triza-pill" data-value="Pending">Pending</button>
          <button class="triza-pill" data-value="Fulfilled">Fulfilled</button>
          <button class="triza-pill" data-value="Cancelled">Cancelled</button>
        </div>
        <div class="triza-card">
          <h3>Pre-Booking Orders</h3>
          <div id="prebook-report-table"></div>
        </div>
      </div>
    </div>

    <!-- MENU PANEL -->
    <div class="triza-panel" id="panel-menu">
      <div class="triza-card" style="margin-bottom:18px;">
        <h3>Add Menu Item</h3>
        <div class="triza-row-2">
          <div class="triza-field"><label>Item Name</label><input id="new-item-name" placeholder="e.g. Chicken Biryani"></div>
          <div class="triza-field"><label>Category</label><input id="new-item-category" placeholder="e.g. Biryani & Rice"></div>
        </div>
        <div class="triza-row-2">
          <div class="triza-field"><label>Price (₹)</label><input type="number" id="new-item-price" placeholder="0"></div>
          <div class="triza-field">
            <label>Type</label>
            <select id="new-item-type"><option value="nonveg">Non-Veg</option><option value="veg">Veg</option></select>
          </div>
        </div>
        <button class="triza-btn-secondary" id="add-item-btn">+ Add Item</button>
      </div>
      <div class="triza-card">
        <h3>All Menu Items</h3>
        <div id="menu-table"></div>
      </div>
    </div>

  </div>
</div>

<div id="toast-root"></div>

<script>
(function() {
  const DEFAULT_MENU = [
    {cat:"Biryani & Rice", name:"Chicken Biryani", price:220, type:"nonveg"},
    {cat:"Biryani & Rice", name:"Chicken Fried Rice", price:180, type:"nonveg"},
    {cat:"Biryani & Rice", name:"Chicken Fried Noodles", price:180, type:"nonveg"},
    {cat:"Starters", name:"Chicken 65", price:160, type:"nonveg"},
    {cat:"Starters", name:"Crispy Fried Chicken", price:190, type:"nonveg"},
    {cat:"Wraps / Shawarma", name:"Chicken Shawarma", price:150, type:"nonveg"},
    {cat:"Wraps / Shawarma", name:"Paneer Shawarma", price:140, type:"veg"},
    {cat:"Wraps / Shawarma", name:"Veg Shawarma", price:120, type:"veg"},
    {cat:"Burger", name:"Chicken Burger", price:130, type:"nonveg"},
    {cat:"Burger", name:"Paneer Burger", price:120, type:"veg"},
    {cat:"Burger", name:"Veg Burger", price:100, type:"veg"},
    {cat:"Sandwich", name:"Chicken Sandwich", price:140, type:"nonveg"},
    {cat:"Sandwich", name:"Paneer Sandwich", price:130, type:"veg"},
    {cat:"Sandwich", name:"Veg Sandwich", price:110, type:"veg"},
    {cat:"Pizza", name:"Chicken Pizza", price:250, type:"nonveg"},
    {cat:"Pizza", name:"Paneer Pizza", price:230, type:"veg"},
    {cat:"Pizza", name:"Veg Pizza", price:200, type:"veg"},
    {cat:"Milkshake", name:"Rose Milkshake", price:120, type:"veg"},
    {cat:"Milkshake", name:"Chocolate Milkshake", price:130, type:"veg"},
    {cat:"Milkshake", name:"Butter Milkshake", price:130, type:"veg"},
    {cat:"Milkshake", name:"Vanilla Milkshake", price:110, type:"veg"},
  ].map((m, i) => ({ id: "m" + (i+1), name: m.name, category: m.cat, price: m.price, type: m.type, active: true }));

  let state = {
    menu: [],
    orders: [],
    prebookings: [],
    cart: {},      // id -> qty  (bill)
    pbCart: {},    // id -> qty  (prebook)
    orderType: "Takeaway",
    paymentMethod: "Cash",
    gst: false,
    reportType: "sales",
    period: "today",
    pbStatusFilter: "All"
  };

  async function loadAll() {
    state.menu = await getOrInit('menu', DEFAULT_MENU);
    state.orders = await getOrInit('orders', []);
    state.prebookings = await getOrInit('prebookings', []);
  }

  async function getOrInit(key, fallback) {
    try {
      const res = await window.storage.get(key, true);
      return res ? JSON.parse(res.value) : fallback;
    } catch (e) {
      await window.storage.set(key, JSON.stringify(fallback), true);
      return fallback;
    }
  }

  async function persist(key) {
    try {
      await window.storage.set(key, JSON.stringify(state[key]), true);
    } catch (e) {
      showToast("Couldn't save — try again");
    }
  }

  function showToast(msg) {
    const root = document.getElementById('toast-root');
    const el = document.createElement('div');
    el.className = 'triza-toast';
    el.textContent = msg;
    root.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }

  function fmt(n) { return "₹" + Math.round(n).toLocaleString('en-IN'); }

  function groupByCategory(items) {
    const groups = {};
    items.forEach(i => {
      if (!groups[i.category]) groups[i.category] = [];
      groups[i.category].push(i);
    });
    return groups;
  }

  // ---------- TABS ----------
  document.querySelectorAll('.triza-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.triza-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.triza-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab === 'reports') renderReports();
      if (tab.dataset.tab === 'prebook') renderPrebookList();
    });
  });

  // ---------- MENU PICKER (Bill) ----------
  function renderMenuPicker() {
    const container = document.getElementById('menu-picker');
    const groups = groupByCategory(state.menu.filter(m => m.active));
    container.innerHTML = Object.keys(groups).map(cat => `
      <div class="triza-cat-label">${cat}</div>
      <div class="triza-item-grid">
        ${groups[cat].map(item => `
          <button class="triza-item-btn" data-id="${item.id}" data-scope="bill">
            <span class="triza-item-name"><span class="triza-veg-dot ${item.type}"></span>${item.name}</span>
            <span class="triza-item-price">${fmt(item.price)}</span>
          </button>
        `).join('')}
      </div>
    `).join('');
  }

  function renderPrebookMenuPicker() {
    const container = document.getElementById('prebook-menu-picker');
    const groups = groupByCategory(state.menu.filter(m => m.active));
    container.innerHTML = Object.keys(groups).map(cat => `
      <div class="triza-cat-label">${cat}</div>
      <div class="triza-item-grid">
        ${groups[cat].map(item => `
          <button class="triza-item-btn" data-id="${item.id}" data-scope="prebook">
            <span class="triza-item-name"><span class="triza-veg-dot ${item.type}"></span>${item.name}</span>
            <span class="triza-item-price">${fmt(item.price)}</span>
          </button>
        `).join('')}
      </div>
    `).join('');
  }

  document.getElementById('menu-picker').addEventListener('click', e => {
    const btn = e.target.closest('.triza-item-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    state.cart[id] = (state.cart[id] || 0) + 1;
    renderReceipt();
  });
  document.getElementById('prebook-menu-picker').addEventListener('click', e => {
    const btn = e.target.closest('.triza-item-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    state.pbCart[id] = (state.pbCart[id] || 0) + 1;
    renderPbTotals();
  });

  // ---------- RECEIPT (Bill cart) ----------
  function calcCartTotals(cart) {
    const lines = Object.keys(cart).map(id => {
      const item = state.menu.find(m => m.id === id);
      if (!item) return null;
      return { item, qty: cart[id], lineTotal: item.price * cart[id] };
    }).filter(Boolean);
    const subtotal = lines.reduce((s, l) => s + l.lineTotal, 0);
    return { lines, subtotal };
  }

  function renderReceipt() {
    const { lines, subtotal } = calcCartTotals(state.cart);
    const linesEl = document.getElementById('receipt-lines');
    document.getElementById('receipt-time').textContent = new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });

    if (lines.length === 0) {
      linesEl.innerHTML = `<div class="triza-receipt-empty">Tap items to add them here</div>`;
    } else {
      linesEl.innerHTML = lines.map(l => `
        <div class="triza-receipt-line">
          <span class="name">${l.item.name}</span>
          <span class="qty-ctrl">
            <button data-id="${l.item.id}" data-action="dec">−</button>
            <span>${l.qty}</span>
            <button data-id="${l.item.id}" data-action="inc">+</button>
          </span>
          <span>${fmt(l.lineTotal)}</span>
        </div>
      `).join('');
    }

    const gst = state.gst ? subtotal * 0.05 : 0;
    const total = subtotal + gst;
    document.getElementById('receipt-totals').innerHTML = `
      <div class="row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
      ${state.gst ? `<div class="row"><span>GST (5%)</span><span>${fmt(gst)}</span></div>` : ''}
      <div class="row grand"><span>Total</span><span>${fmt(total)}</span></div>
    `;
    document.getElementById('complete-bill-btn').disabled = lines.length === 0;
  }

  document.getElementById('receipt-lines').addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.dataset.action === 'inc') state.cart[id]++;
    if (btn.dataset.action === 'dec') {
      state.cart[id]--;
      if (state.cart[id] <= 0) delete state.cart[id];
    }
    renderReceipt();
  });

  document.getElementById('gst-toggle').addEventListener('change', e => {
    state.gst = e.target.checked;
    renderReceipt();
  });

  document.getElementById('order-type-group').addEventListener('click', e => {
    const pill = e.target.closest('.triza-pill');
    if (!pill) return;
    document.querySelectorAll('#order-type-group .triza-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
    state.orderType = pill.dataset.value;
  });
  document.getElementById('payment-method-group').addEventListener('click', e => {
    const pill = e.target.closest('.triza-pill');
    if (!pill) return;
    document.querySelectorAll('#payment-method-group .triza-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
    state.paymentMethod = pill.dataset.value;
  });

  document.getElementById('complete-bill-btn').addEventListener('click', async () => {
    const { lines, subtotal } = calcCartTotals(state.cart);
    if (lines.length === 0) return;
    const gst = state.gst ? subtotal * 0.05 : 0;
    const total = subtotal + gst;
    const order = {
      id: "TRZ-" + Date.now().toString(36).toUpperCase(),
      timestamp: Date.now(),
      items: lines.map(l => ({ name: l.item.name, qty: l.qty, price: l.item.price, lineTotal: l.lineTotal })),
      subtotal, gst, total,
      customerName: document.getElementById('bill-name').value.trim(),
      phone: document.getElementById('bill-phone').value.trim(),
      orderType: state.orderType,
      paymentMethod: state.paymentMethod
    };
    state.orders.push(order);
    await persist('orders');
    state.cart = {};
    document.getElementById('bill-name').value = '';
    document.getElementById('bill-phone').value = '';
    renderReceipt();
    showToast(`Bill ${order.id} saved — ${fmt(order.total)}`);
  });

  // ---------- PRE-BOOKING ----------
  function renderPbTotals() {
    const { lines, subtotal } = calcCartTotals(state.pbCart);
    document.getElementById('pb-totals').innerHTML = lines.length === 0
      ? `<div style="color:var(--muted); font-size:12px;">No items selected yet</div>`
      : lines.map(l => `<div class="row"><span>${l.item.name} × ${l.qty}</span><span>${fmt(l.lineTotal)}</span></div>`).join('') +
        `<div class="row grand"><span>Total</span><span>${fmt(subtotal)}</span></div>`;
    checkPbValid();
  }

  function checkPbValid() {
    const name = document.getElementById('pb-name').value.trim();
    const phone = document.getElementById('pb-phone').value.trim();
    const hasItems = Object.keys(state.pbCart).length > 0;
    document.getElementById('save-prebook-btn').disabled = !(name && phone && hasItems);
  }
  ['pb-name', 'pb-phone'].forEach(id => document.getElementById(id).addEventListener('input', checkPbValid));

  document.getElementById('save-prebook-btn').addEventListener('click', async () => {
    const { lines, subtotal } = calcCartTotals(state.pbCart);
    const booking = {
      id: "PB-" + Date.now().toString(36).toUpperCase(),
      timestamp: Date.now(),
      customerName: document.getElementById('pb-name').value.trim(),
      phone: document.getElementById('pb-phone').value.trim(),
      deliveryDate: document.getElementById('pb-date').value,
      deliveryTime: document.getElementById('pb-time').value,
      advance: Number(document.getElementById('pb-advance').value) || 0,
      notes: document.getElementById('pb-notes').value.trim(),
      items: lines.map(l => ({ name: l.item.name, qty: l.qty, price: l.item.price, lineTotal: l.lineTotal })),
      total: subtotal,
      status: "Pending"
    };
    state.prebookings.push(booking);
    await persist('prebookings');
    state.pbCart = {};
    ['pb-name','pb-phone','pb-date','pb-time','pb-advance','pb-notes'].forEach(id => document.getElementById(id).value = '');
    renderPbTotals();
    renderPrebookList();
    showToast(`Pre-booking ${booking.id} saved`);
  });

  function renderPrebookList() {
    const container = document.getElementById('prebook-list');
    const sorted = [...state.prebookings].sort((a,b) => b.timestamp - a.timestamp);
    if (sorted.length === 0) {
      container.innerHTML = `<div class="triza-empty-state">No pre-bookings yet</div>`;
      return;
    }
    container.innerHTML = `
      <table class="triza-table">
        <thead><tr><th>ID</th><th>Customer</th><th>Delivery</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${sorted.map(b => `
            <tr>
              <td>${b.id}</td>
              <td>${b.customerName}<br><span style="color:var(--muted);font-size:11px;">${b.phone}</span></td>
              <td>${b.deliveryDate || '—'} ${b.deliveryTime || ''}</td>
              <td>${b.items.map(i => i.name + ' ×' + i.qty).join(', ')}</td>
              <td>${fmt(b.total)}</td>
              <td><span class="triza-badge badge-${b.status.toLowerCase()}">${b.status}</span></td>
              <td>
                ${b.status === 'Pending' ? `
                  <button class="triza-btn-secondary" data-pb-action="fulfill" data-id="${b.id}" style="padding:5px 9px;font-size:11px;">Mark Fulfilled</button>
                  <button class="triza-btn-secondary" data-pb-action="cancel" data-id="${b.id}" style="padding:5px 9px;font-size:11px;">Cancel</button>
                ` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  document.getElementById('prebook-list').addEventListener('click', async e => {
    const btn = e.target.closest('button[data-pb-action]');
    if (!btn) return;
    const booking = state.prebookings.find(b => b.id === btn.dataset.id);
    if (!booking) return;
    booking.status = btn.dataset.pbAction === 'fulfill' ? 'Fulfilled' : 'Cancelled';
    await persist('prebookings');
    renderPrebookList();
  });

  // ---------- REPORTS ----------
  document.getElementById('report-type-group').addEventListener('click', e => {
    const pill = e.target.closest('.triza-pill');
    if (!pill) return;
    document.querySelectorAll('#report-type-group .triza-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
    state.reportType = pill.dataset.value;
    document.getElementById('sales-report').style.display = state.reportType === 'sales' ? 'block' : 'none';
    document.getElementById('prebook-report').style.display = state.reportType === 'prebook' ? 'block' : 'none';
    renderReports();
  });
  document.getElementById('period-group').addEventListener('click', e => {
    const pill = e.target.closest('.triza-pill');
    if (!pill) return;
    document.querySelectorAll('#period-group .triza-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
    state.period = pill.dataset.value;
    renderReports();
  });
  document.getElementById('pb-status-group').addEventListener('click', e => {
    const pill = e.target.closest('.triza-pill');
    if (!pill) return;
    document.querySelectorAll('#pb-status-group .triza-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
    state.pbStatusFilter = pill.dataset.value;
    renderReports();
  });

  function filterOrdersByPeriod() {
    const now = new Date();
    return state.orders.filter(o => {
      const d = new Date(o.timestamp);
      if (state.period === 'today') return d.toDateString() === now.toDateString();
      if (state.period === 'week') {
        const start = new Date(now); start.setDate(now.getDate() - now.getDay());
        start.setHours(0,0,0,0);
        return d >= start;
      }
      if (state.period === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      return true;
    });
  }

  function renderReports() {
    if (state.reportType === 'sales') renderSalesReport();
    else renderPrebookReport();
  }

  function renderSalesReport() {
    const orders = filterOrdersByPeriod();
    const totalRevenue = orders.reduce((s,o) => s + o.total, 0);
    const orderCount = orders.length;
    const avg = orderCount ? totalRevenue / orderCount : 0;
    const cashTotal = orders.filter(o => o.paymentMethod === 'Cash').reduce((s,o) => s + o.total, 0);
    const onlineTotal = totalRevenue - cashTotal;

    document.getElementById('sales-summary').innerHTML = `
      <div class="triza-summary-card"><div class="label">Total Revenue</div><div class="value">${fmt(totalRevenue)}</div></div>
      <div class="triza-summary-card"><div class="label">Orders</div><div class="value">${orderCount}</div></div>
      <div class="triza-summary-card"><div class="label">Avg Order Value</div><div class="value">${fmt(avg)}</div></div>
      <div class="triza-summary-card"><div class="label">Cash vs Online</div><div class="value" style="font-size:15px;">${fmt(cashTotal)} / ${fmt(onlineTotal)}</div></div>
    `;

    const itemTotals = {};
    orders.forEach(o => o.items.forEach(i => {
      if (!itemTotals[i.name]) itemTotals[i.name] = { qty: 0, revenue: 0 };
      itemTotals[i.name].qty += i.qty;
      itemTotals[i.name].revenue += i.lineTotal;
    }));
    const itemRows = Object.entries(itemTotals).sort((a,b) => b[1].revenue - a[1].revenue);
    document.getElementById('item-sales-table').innerHTML = itemRows.length === 0
      ? `<div class="triza-empty-state">No sales in this period</div>`
      : `<table class="triza-table"><thead><tr><th>Item</th><th>Qty Sold</th><th>Revenue</th></tr></thead><tbody>
          ${itemRows.map(([name, d]) => `<tr><td>${name}</td><td>${d.qty}</td><td>${fmt(d.revenue)}</td></tr>`).join('')}
        </tbody></table>`;

    const sortedOrders = [...orders].sort((a,b) => b.timestamp - a.timestamp);
    document.getElementById('orders-table').innerHTML = sortedOrders.length === 0
      ? `<div class="triza-empty-state">No orders in this period</div>`
      : `<table class="triza-table"><thead><tr><th>ID</th><th>Time</th><th>Customer</th><th>Type</th><th>Payment</th><th>Total</th></tr></thead><tbody>
          ${sortedOrders.map(o => `
            <tr>
              <td>${o.id}</td>
              <td>${new Date(o.timestamp).toLocaleString('en-IN', {dateStyle:'short', timeStyle:'short'})}</td>
              <td>${o.customerName || '—'}</td>
              <td>${o.orderType}</td>
              <td>${o.paymentMethod}</td>
              <td>${fmt(o.total)}</td>
            </tr>
          `).join('')}
        </tbody></table>`;
  }

  function renderPrebookReport() {
    const filtered = state.prebookings.filter(b => state.pbStatusFilter === 'All' || b.status === state.pbStatusFilter);
    const sorted = [...filtered].sort((a,b) => b.timestamp - a.timestamp);
    document.getElementById('prebook-report-table').innerHTML = sorted.length === 0
      ? `<div class="triza-empty-state">No pre-bookings found</div>`
      : `<table class="triza-table"><thead><tr><th>ID</th><th>Customer</th><th>Delivery</th><th>Items</th><th>Total</th><th>Advance</th><th>Status</th></tr></thead><tbody>
          ${sorted.map(b => `
            <tr>
              <td>${b.id}</td>
              <td>${b.customerName}<br><span style="color:var(--muted);font-size:11px;">${b.phone}</span></td>
              <td>${b.deliveryDate || '—'} ${b.deliveryTime || ''}</td>
              <td>${b.items.map(i => i.name + ' ×' + i.qty).join(', ')}</td>
              <td>${fmt(b.total)}</td>
              <td>${fmt(b.advance)}</td>
              <td><span class="triza-badge badge-${b.status.toLowerCase()}">${b.status}</span></td>
            </tr>
          `).join('')}
        </tbody></table>`;
  }

  // ---------- MENU MANAGEMENT ----------
  function renderMenuTable() {
    const container = document.getElementById('menu-table');
    const groups = groupByCategory(state.menu);
    container.innerHTML = Object.keys(groups).map(cat => `
      <div class="triza-cat-label">${cat}</div>
      <table class="triza-table" style="margin-bottom:10px;">
        <tbody>
          ${groups[cat].map(item => `
            <tr style="${item.active ? '' : 'opacity:0.45;'}">
              <td><span class="triza-veg-dot ${item.type}"></span>${item.name}</td>
              <td style="width:110px;"><input type="number" data-price-id="${item.id}" value="${item.price}" style="width:90px; padding:5px 8px; border:1px solid var(--border); border-radius:6px;"></td>
              <td style="width:90px;">
                <button class="triza-btn-secondary" data-toggle-id="${item.id}" style="padding:5px 9px;font-size:11px;">${item.active ? 'Disable' : 'Enable'}</button>
              </td>
              <td style="width:60px;">
                <button class="triza-btn-secondary" data-delete-id="${item.id}" style="padding:5px 9px;font-size:11px;color:var(--chili);">Delete</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `).join('');
  }

  document.getElementById('menu-table').addEventListener('change', async e => {
    const priceInput = e.target.closest('input[data-price-id]');
    if (!priceInput) return;
    const item = state.menu.find(m => m.id === priceInput.dataset.priceId);
    if (item) {
      item.price = Number(priceInput.value) || 0;
      await persist('menu');
      renderMenuPicker();
      renderPrebookMenuPicker();
      showToast(`${item.name} price updated`);
    }
  });

  document.getElementById('menu-table').addEventListener('click', async e => {
    const toggleBtn = e.target.closest('button[data-toggle-id]');
    const deleteBtn = e.target.closest('button[data-delete-id]');
    if (toggleBtn) {
      const item = state.menu.find(m => m.id === toggleBtn.dataset.toggleId);
      item.active = !item.active;
      await persist('menu');
      renderMenuTable(); renderMenuPicker(); renderPrebookMenuPicker();
    }
    if (deleteBtn) {
      state.menu = state.menu.filter(m => m.id !== deleteBtn.dataset.deleteId);
      await persist('menu');
      renderMenuTable(); renderMenuPicker(); renderPrebookMenuPicker();
      showToast('Item deleted');
    }
  });

  document.getElementById('add-item-btn').addEventListener('click', async () => {
    const name = document.getElementById('new-item-name').value.trim();
    const category = document.getElementById('new-item-category').value.trim();
    const price = Number(document.getElementById('new-item-price').value) || 0;
    const type = document.getElementById('new-item-type').value;
    if (!name || !category || !price) { showToast('Fill in name, category and price'); return; }
    state.menu.push({ id: 'm' + Date.now(), name, category, price, type, active: true });
    await persist('menu');
    ['new-item-name','new-item-category','new-item-price'].forEach(id => document.getElementById(id).value = '');
    renderMenuTable(); renderMenuPicker(); renderPrebookMenuPicker();
    showToast(`${name} added to menu`);
  });

  // ---------- INIT ----------
  (async function init() {
    await loadAll();
    renderMenuPicker();
    renderPrebookMenuPicker();
    renderReceipt();
    renderPbTotals();
    renderPrebookList();
    renderMenuTable();
  })();
})();
</script>
